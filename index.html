<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Clock</title>
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  <meta name="theme-color" content="#0c0c0e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="World Clock">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0e; --surface: #13131a; --border: rgba(255,255,255,0.07);
      --accent: #c8a96e; --accent-dim: rgba(200,169,110,0.15);
      --text-primary: #f0ede8; --text-secondary: rgba(240,237,232,0.45); --text-dim: rgba(240,237,232,0.2);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text-primary); font-family: 'Roboto Mono', monospace; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }
    .page { position: relative; z-index: 1; min-height: 100vh; padding: 14px 14px 10px; max-width: 1100px; margin: 0 auto; }
    header { margin-bottom: 10px; animation: fadeUp 0.8s ease both; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .header-label { font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 2px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(1.2rem, 4vw, 1.8rem); line-height: 1.1; letter-spacing: -0.01em; }
    h1 em { font-style: italic; color: var(--accent); }
    .header-line { width: 32px; height: 1px; background: var(--accent); margin-top: 6px; opacity: 0.6; }
    .btn-settings {
      display: flex; align-items: center; gap: 6px; background: none;
      border: 1px solid var(--border); color: var(--text-secondary);
      font-family: 'Roboto Mono', monospace; font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 6px 10px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s; white-space: nowrap;
    }
    .btn-settings:hover { border-color: var(--accent); color: var(--accent); }
    .btn-settings svg { width: 10px; height: 10px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
    .clock-card { background: var(--surface); padding: 10px 10px 8px; position: relative; overflow: hidden; transition: background 0.3s ease; animation: fadeUp 0.8s ease both; }
    .clock-card:hover { background: #16161f; }
    .clock-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0; transition: opacity 0.3s ease; }
    .clock-card:hover::after { opacity: 0.5; }
    .card-index { display: none; }
    .city-name { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 0.95rem; color: var(--text-primary); letter-spacing: 0.01em; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .country-name { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .time-display { font-family: 'Roboto Mono', monospace; font-weight: 300; font-size: 1.55rem; color: var(--text-primary); letter-spacing: -0.03em; line-height: 1; margin-bottom: 4px; }
    .date-display { font-size: 8px; color: var(--text-secondary); letter-spacing: 0.06em; }
    footer { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; animation: fadeUp 0.8s ease 0.6s both; }
    .footer-text { font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }
    .live-dot { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: #4caf50; animation: pulse 2s ease infinite; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: #16161f; border: 1px solid rgba(255,255,255,0.1); padding: 32px; width: min(460px, 90vw); transform: translateY(12px); transition: transform 0.25s ease; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 4px; }
    .modal-subtitle { font-size: 10px; color: var(--text-secondary); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 22px; }
    .city-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 24px; }
    .city-toggle { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; border: 1px solid transparent; cursor: pointer; transition: background 0.15s, border-color 0.15s; user-select: none; }
    .city-toggle:hover { background: rgba(255,255,255,0.03); }
    .city-toggle.selected { border-color: rgba(200,169,110,0.3); background: rgba(200,169,110,0.06); }
    .city-toggle-left { display: flex; flex-direction: column; gap: 2px; }
    .city-toggle-name { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--text-primary); }
    .city-toggle-country { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-secondary); }
    .checkmark { width: 18px; height: 18px; border: 1px solid var(--border); border-radius: 2px; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; flex-shrink: 0; }
    .city-toggle.selected .checkmark { background: var(--accent); border-color: var(--accent); }
    .checkmark svg { display: none; }
    .city-toggle.selected .checkmark svg { display: block; }
    .min-warning { font-size: 9px; color: #e07070; letter-spacing: 0.1em; text-align: right; margin-top: -16px; margin-bottom: 16px; display: none; }
    .min-warning.visible { display: block; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn { font-family: 'Roboto Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; padding: 10px 20px; border: 1px solid var(--border); background: none; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
    .btn:hover { border-color: var(--text-secondary); color: var(--text-primary); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #0c0c0e; }
    .btn-primary:hover { background: #d4b87a; border-color: #d4b87a; color: #0c0c0e; }

    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .clock-card:nth-child(1){animation-delay:0.05s} .clock-card:nth-child(2){animation-delay:0.10s}
    .clock-card:nth-child(3){animation-delay:0.15s} .clock-card:nth-child(4){animation-delay:0.20s}
    .clock-card:nth-child(5){animation-delay:0.25s} .clock-card:nth-child(6){animation-delay:0.30s}
    .clock-card:nth-child(7){animation-delay:0.35s} .clock-card:nth-child(8){animation-delay:0.40s}
    @media (max-width: 800px) { .page { padding: 12px 10px 8px; } .grid { grid-template-columns: repeat(2, 1fr) !important; } }
    @media (min-width: 801px) { .clock-card { padding: 14px; } .city-name { font-size: 1.1rem; } .time-display { font-size: 1.9rem; } }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="header-left">
      <p class="header-label">Global Time Reference</p>
      <h1>World <em>Clock</em></h1>
      <div class="header-line"></div>
    </div>
    <button class="btn-settings" id="btnSettings">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
      </svg>
      Customise
    </button>
  </header>
  <div class="grid" id="clockGrid"></div>
  <footer>
    <span class="footer-text" id="footerCount"></span>
    <span class="live-dot"><span class="dot"></span>Live</span>
  </footer>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Choose your cities</div>
    <div class="modal-subtitle">Select the locations to display</div>
    <div class="city-list" id="cityList"></div>
    <div class="min-warning" id="minWarning">Please select at least 1 city</div>
    <div class="modal-actions">
      <button class="btn" id="btnCancel">Cancel</button>
      <button class="btn btn-primary" id="btnSave">Save</button>
    </div>
  </div>
</div>

<script>
  const ALL_ZONES = [
    { city: "San Pedro",    country: "Belize",         tz: "America/Belize",     abbr: "CST"      },
    { city: "Miami",        country: "United States",  tz: "America/New_York",   abbr: "EST/EDT"  },
    { city: "Montevideo",   country: "Uruguay",        tz: "America/Montevideo", abbr: "UYT"      },
    { city: "London",       country: "United Kingdom", tz: "Europe/London",      abbr: "GMT/BST"  },
    { city: "Oslo",         country: "Norway",         tz: "Europe/Oslo",        abbr: "CET/CEST" },
    { city: "Tbilisi",      country: "Georgia",        tz: "Asia/Tbilisi",       abbr: "GET"      },
    { city: "Tashkent",     country: "Uzbekistan",     tz: "Asia/Tashkent",      abbr: "UZT"      },
    { city: "Kuala Lumpur", country: "Malaysia",       tz: "Asia/Kuala_Lumpur",  abbr: "MYT"      },
  ];

  const STORAGE_KEY = 'worldclock_selected';

  function loadSelected() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) { const arr = JSON.parse(saved); if (Array.isArray(arr) && arr.length > 0) return arr; }
    } catch(e) {}
    return ALL_ZONES.map(z => z.city);
  }

  function saveSelected(cities) { localStorage.setItem(STORAGE_KEY, JSON.stringify(cities)); }

  function getOffset(tz) {
    const now = new Date();
    const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
    const localMs = new Date(now.toLocaleString('en-US', { timeZone: tz })).getTime();
    const diff = Math.round((localMs - utcMs) / 3600000);
    return diff >= 0 ? `UTC +${diff}` : `UTC ${diff}`;
  }

  let activeZones = [];
  let tickInterval = null;

  function buildGrid() {
    const selected = loadSelected();
    activeZones = ALL_ZONES.filter(z => selected.includes(z.city));
    const grid = document.getElementById('clockGrid');
    grid.innerHTML = '';
    const count = activeZones.length;
    grid.style.gridTemplateColumns = count <= 3 ? `repeat(${count}, 1fr)` : 'repeat(4, 1fr)';
    activeZones.forEach((z, i) => {
      const card = document.createElement('div');
      card.className = 'clock-card';
      card.innerHTML = `
        <div class="city-name">${z.city}</div>
        <div class="country-name">${z.country}</div>
        <div class="time-display" id="time-${i}">--:--</div>
        <div class="date-display" id="date-${i}">---</div>
      `;
      grid.appendChild(card);
    });
    document.getElementById('footerCount').textContent =
      `${count} Location${count !== 1 ? 's' : ''} · UTC Offsets`;
    if (tickInterval) clearInterval(tickInterval);
    updateClocks();
    tickInterval = setInterval(updateClocks, 1000);
  }

  function updateClocks() {
    const now = new Date();
    activeZones.forEach((z, i) => {
      const parts = new Intl.DateTimeFormat('en-GB', { timeZone: z.tz, hour: '2-digit', minute: '2-digit', hour12: false }).formatToParts(now);
      const get = t => parts.find(p => p.type === t)?.value ?? '';
      document.getElementById(`time-${i}`).textContent = `${get('hour')}:${get('minute')}`;
      document.getElementById(`date-${i}`).textContent =
        new Intl.DateTimeFormat('en-GB', { timeZone: z.tz, weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }).format(now);
    });
  }

  let pendingSelected = [];

  function openModal() {
    pendingSelected = loadSelected().slice();
    const list = document.getElementById('cityList');
    list.innerHTML = '';
    ALL_ZONES.forEach(z => {
      const isSelected = pendingSelected.includes(z.city);
      const row = document.createElement('div');
      row.className = 'city-toggle' + (isSelected ? ' selected' : '');
      row.dataset.city = z.city;
      row.innerHTML = `
        <div class="city-toggle-left">
          <span class="city-toggle-name">${z.city}</span>
          <span class="city-toggle-country">${z.country}</span>
        </div>
        <div class="checkmark">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#0c0c0e" stroke-width="2">
            <polyline points="1.5,5 4,7.5 8.5,2.5"/>
          </svg>
        </div>`;
      row.addEventListener('click', () => {
        const city = row.dataset.city;
        if (pendingSelected.includes(city)) { pendingSelected = pendingSelected.filter(c => c !== city); row.classList.remove('selected'); }
        else { pendingSelected.push(city); row.classList.add('selected'); }
        document.getElementById('minWarning').classList.toggle('visible', pendingSelected.length === 0);
      });
      list.appendChild(row);
    });
    document.getElementById('minWarning').classList.remove('visible');
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

  document.getElementById('btnSettings').addEventListener('click', openModal);
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target.id === 'modalOverlay') closeModal(); });
  document.getElementById('btnSave').addEventListener('click', () => {
    if (pendingSelected.length === 0) { document.getElementById('minWarning').classList.add('visible'); return; }
    const ordered = ALL_ZONES.map(z => z.city).filter(c => pendingSelected.includes(c));
    saveSelected(ordered);
    closeModal();
    buildGrid();
  });

  buildGrid();
</script>
</body>
</html>
