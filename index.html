<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Clock</title>
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  <meta name="theme-color" content="#0c0c0e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="World Clock">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #13131a;
      --border: rgba(255,255,255,0.07);
      --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.15);
      --text-primary: #f0ede8;
      --text-secondary: rgba(240,237,232,0.45);
      --text-dim: rgba(240,237,232,0.2);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Roboto Mono', monospace;
      overflow-x: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 24px 40px 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 16px;
      animation: fadeUp 0.8s ease both;
    }

    .header-label {
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      line-height: 1.1;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .header-line {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin-top: 10px;
      opacity: 0.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .clock-card {
      background: var(--surface);
      padding: 20px 20px;
      position: relative;
      overflow: hidden;
      transition: background 0.3s ease;
      animation: fadeUp 0.8s ease both;
    }

    .clock-card:hover {
      background: #16161f;
    }

    .clock-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .clock-card:hover::after {
      opacity: 0.5;
    }

    .card-index {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .city-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 1.35rem;
      color: var(--text-primary);
      letter-spacing: 0.01em;
      margin-bottom: 4px;
    }

    .country-name {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .time-display {
      font-family: 'Roboto Mono', monospace;
      font-weight: 300;
      font-size: 2.4rem;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 8px;
      transition: color 0.2s;
    }

    .time-display .seconds {
      font-size: 1.3rem;
      color: var(--text-secondary);
      vertical-align: baseline;
    }

    .ampm {
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-left: 6px;
    }

    .date-display {
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .timezone-badge {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 8px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: rgba(255,255,255,0.02);
    }

    .offset-label {
      font-size: 9px;
      color: var(--text-dim);
      margin-left: 8px;
      letter-spacing: 0.08em;
    }

    footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeUp 0.8s ease 0.6s both;
    }

    .footer-text {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .live-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .clock-card:nth-child(1) { animation-delay: 0.05s; }
    .clock-card:nth-child(2) { animation-delay: 0.10s; }
    .clock-card:nth-child(3) { animation-delay: 0.15s; }
    .clock-card:nth-child(4) { animation-delay: 0.20s; }
    .clock-card:nth-child(5) { animation-delay: 0.25s; }
    .clock-card:nth-child(6) { animation-delay: 0.30s; }
    .clock-card:nth-child(7) { animation-delay: 0.35s; }
    .clock-card:nth-child(8) { animation-delay: 0.40s; }

    @media (max-width: 800px) {
      .page { padding: 36px 20px 60px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      h1 { font-size: 2rem; }
    }

    @media (max-width: 420px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <p class="header-label">Global Time Reference</p>
    <h1>World <em>Clock</em></h1>
    <div class="header-line"></div>
  </header>

  <div class="grid" id="clockGrid"></div>

  <footer>
    <span class="footer-text">8 Locations · UTC Offsets</span>
    <span class="live-dot"><span class="dot"></span>Live</span>
  </footer>

</div>

<script>
  const zones = [
    { city: "San Pedro",    country: "Belize",         tz: "America/Belize",      abbr: "CST"       },
    { city: "Miami",        country: "United States",  tz: "America/New_York",    abbr: "EST/EDT"   },
    { city: "Montevideo",   country: "Uruguay",        tz: "America/Montevideo",  abbr: "UYT"       },
    { city: "London",       country: "United Kingdom", tz: "Europe/London",       abbr: "GMT/BST"   },
    { city: "Oslo",         country: "Norway",         tz: "Europe/Oslo",         abbr: "CET/CEST"  },
    { city: "Tbilisi",      country: "Georgia",        tz: "Asia/Tbilisi",        abbr: "GET"       },
    { city: "Tashkent",     country: "Uzbekistan",     tz: "Asia/Tashkent",       abbr: "UZT"       },
    { city: "Kuala Lumpur", country: "Malaysia",       tz: "Asia/Kuala_Lumpur",   abbr: "MYT"       },
  ];

  function getOffset(tz) {
    const now = new Date();
    const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
    const localMs = new Date(now.toLocaleString('en-US', { timeZone: tz })).getTime();
    const diff = Math.round((localMs - utcMs) / 3600000);
    return diff >= 0 ? `UTC +${diff}` : `UTC ${diff}`;
  }

  function buildCards() {
    const grid = document.getElementById('clockGrid');
    zones.forEach((z, i) => {
      const card = document.createElement('div');
      card.className = 'clock-card';
      card.innerHTML = `
        <div class="card-index">${String(i + 1).padStart(2, '0')}</div>
        <div class="city-name">${z.city}</div>
        <div class="country-name">${z.country}</div>
        <div class="time-display" id="time-${i}">--:--<span class="seconds">:--</span><span class="ampm"></span></div>
        <div class="date-display" id="date-${i}">---</div>
        <div>
          <span class="timezone-badge">${z.abbr}</span>
          <span class="offset-label" id="off-${i}">${getOffset(z.tz)}</span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function updateClocks() {
    const now = new Date();
    zones.forEach((z, i) => {
      const opts = { timeZone: z.tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      const parts = new Intl.DateTimeFormat('en-GB', opts).formatToParts(now);
      const get = type => parts.find(p => p.type === type)?.value ?? '';

      const h = get('hour');
      const m = get('minute');
      const s = get('second');

      const timeEl = document.getElementById(`time-${i}`);
      timeEl.innerHTML = `${h}:${m}`;

      const dateOpts = { timeZone: z.tz, weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' };
      const dateStr = new Intl.DateTimeFormat('en-GB', dateOpts).format(now);
      document.getElementById(`date-${i}`).textContent = dateStr;
    });
  }

  buildCards();
  updateClocks();
  setInterval(updateClocks, 1000);
</script>
</body>
</html>
